# =============================================================================
# users.yaml  —  SINGLE SOURCE OF TRUTH for all user/account configuration
# =============================================================================
#
# FIELD DESCRIPTIONS:
#   username          : unique key used in Redis and dashboard
#   dma               : folder name under Risk_dashboard_inputs/
#   userfolder        : subfolder (legacy)
#   tradebook_prefix  : filename prefix → prefix_YYYY-MM-DD.csv
#   symbol_format     : "spaced"  → BANKNIFTY 28APR2026 CE 51300
#                       "compact" → NIFTY2640722650CE
#   col_symbol        : column name for trading symbol
#   col_qty           : column name for quantity
#   col_price         : column name for price
#   col_side          : column name for BUY/SELL side
#   col_tag           : column name for strategy tag
#   mock_intraday_dir : folder name under Risk_dashboard_inputs/ for intraday mock DB
#                       default: "mock_{dma}"  → e.g. mock_DMA09
#   mock_positional_dir: folder name for positional mock DB
#                       default: "mock_{dma}_P" → e.g. mock_DMA09_P
# =============================================================================

users:
  - username: "DMA16"
    dma: "DMA16"
    userfolder: "out"
    tradebook_prefix: "tradebook_T611"
    symbol_format: "spaced"
    col_symbol: "TradingSymbol"
    col_qty: "LastTradedQuantity"
    col_price: "OrderAverageTradedPrice"
    col_side: "OrderSide"
    col_tag: "OrderUniqueIdentifier"
    mock_intraday_dir: "mock_DMA16"
